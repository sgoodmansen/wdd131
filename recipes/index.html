<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse easy dessert and home-style recipes with step-by-step instructions on RecipeBook.">
    <meta name="author" content="Spencer Goodmansen">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="Browse easy dessert and home-style recipes with step-by-step instructions on RecipeBook.">
    <meta property="og:url" content="https://sgoodmansen.github.io/wdd131/recipes/index.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="Browse easy dessert and home-style recipes with step-by-step instructions on RecipeBook.">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                
    <title>RecipeBook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="images/recipe-book.png" alt="RecipeBook Logo" class="logo">
            <h1>RecipeBook</h1>
        </header>

        <div class="search">
            <input type="text" placeholder="Find a recipe">
            <button><img src="images/search.svg" alt="search icon"></button>
        </div>

        <hr>

        <div class="card">
            <img src="images/apple-crisp.jpg" alt="A bowl of apple crisp with vanilla ice cream">

            <div class="card-content">
                <span class="tag">dessert</span>
                <h2 class="recipe_name">Apple Crisp</h2>
                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>   
        </div>
        
        <footer>
            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>  
            
            <div class="credit">
                <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
            </div>
        </footer>
                
    </div>                 
                
</body>


</html>
